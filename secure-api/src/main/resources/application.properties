# ============================================
# Quantum Auth API Configuration
# ============================================

# Server Configuration
server.port=8080

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5000ms

# JWT Configuration
jwt.default-ttl-seconds=900
jwt.high-risk-ttl-seconds=10

# Enable dynamic expiry (optional)
quantum.jwt.dynamic-expiry.enabled=true

# Entropy Pool Configuration
quantum.pool.key=entropy_pool
quantum.pool.poison-set=poison_keys
quantum.pool.auth-prefix=auth:kid:

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.quantum=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
